name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install bandit
        run: pip install bandit
      
      - name: Run bandit scan
        run: bandit -c bandit.yaml -r app/ -f json -o bandit-report-before.json
      
      - name: Run security gate
        run: python security_gate.py --bandit bandit-report-before.json --threshold high
      
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report-before.json

  build:
    runs-on: ubuntu-latest
    needs: security-scan
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t rbpis-api .
      
      - name: Test container
        run: |
          docker run -d --name test-api rbpis-api
          docker ps | grep test-api
          docker stop test-api
          docker rm test-api

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy with docker-compose
        run: |
          docker compose up -d --build
