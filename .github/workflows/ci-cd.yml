name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  sast-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit scan
        run: bandit -c bandit.yaml -r app/ -f json -o bandit-report-before.json

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report-before.json

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rbpis-api .

      - name: Test container
        run: |
          docker run -d --name test-api rbpis-api
          docker ps | grep test-api
          docker stop test-api
          docker rm test-api

  dast-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start application
        run: |
          docker compose up -d --build
          sleep 10

      - name: Check if app is running
        run: |
          curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:8000/search-users?name=test

      - name: Create ZAP reports directory
        run: |
          mkdir -p zap-reports
          sudo chmod -R 777 zap-reports

      - name: Passive Scan with ZAP
        continue-on-error: true
        run: |
          docker run --rm \
            -v $(pwd)/zap-reports:/zap/wrk \
            --network="host" \
            zaproxy/zap-stable \
            zap-full-scan.py \
            -t "http://localhost:8000/search-users?name=test" \
            -r zap_passive_report.html

      - name: Active Scan with ZAP
        continue-on-error: true
        run: |
          docker run --rm \
            -v $(pwd)/zap-reports:/zap/wrk \
            --network="host" \
            zaproxy/zap-stable \
            zap-api-scan.py \
            -t "http://localhost:8000/openapi.json" \
            -f openapi \
            -r zap_active_report.html

      - name: Upload ZAP passive report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-passive-report
          path: zap-reports/zap_passive_report.html

      - name: Upload ZAP active report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-active-report
          path: zap-reports/zap_active_report.html

      - name: Stop application
        if: always()
        run: docker compose down

  # НОВАЯ JOB: Security Gate проверяет оба отчёта
  security-gate:
    runs-on: ubuntu-latest
    needs: [sast-scan, dast-scan]  # Ждём оба сканирования
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download bandit report
        uses: actions/download-artifact@v4
        with:
          name: bandit-report
          path: .

      - name: Download ZAP passive report
        uses: actions/download-artifact@v4
        with:
          name: zap-passive-report
          path: .

      - name: Download ZAP active report
        uses: actions/download-artifact@v4
        with:
          name: zap-active-report
          path: .

      - name: List downloaded reports
        run: |
          echo "=== Downloaded reports ==="
          ls -la *.json *.html 2>/dev/null || echo "No reports found"

      - name: Run security gate
        run: |
          python security_gate.py \
            --bandit bandit-report-before.json \
            --zap-passive zap_passive_report.html \
            --zap-active zap_active_report.html \
            --threshold high

  deploy:
    runs-on: ubuntu-latest
    needs: [build, security-gate] 
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with docker-compose
        run: |
          docker compose up -d --build